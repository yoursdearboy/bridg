services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql
  app:
    image: bridg:0.0.1
    build: .
    env_file:
      - .env.prod
    depends_on:
      - postgres
    ports:
      - 8001:8001

volumes:
  postgres-data:
